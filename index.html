<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CO2 PRO FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;margin:0}
.card{background:#222;padding:15px;margin:10px;border-radius:15px}
button{padding:12px;font-size:16px;width:90%;margin:5px;border-radius:10px;border:none}
.value{font-size:20px;margin:5px}
.ampel{width:70px;height:70px;border-radius:50%;margin:auto}
.esp{width:25px;height:25px;border-radius:50%;margin:auto;}
input,select{padding:10px;border-radius:10px;border:none;width:80%;margin:5px}
</style>
</head>

<body>

<div id="login">
<h2>Login</h2>
<button onclick="loginSchueler()">👨‍🎓 Schüler</button><br><br>
<input id="pw" placeholder="Admin Passwort">
<button onclick="loginAdmin()">👨‍🔧 Admin</button>
<p id="error" style="color:red;"></p>
</div>

<div id="app" style="display:none">

<button onclick="show('raum')">🏠 Raum</button>
<button onclick="show('wetter')">🌦️ Wetter</button>
<button onclick="show('handout')">📄 Handout</button>
<button onclick="show('settings')" id="adminBtn" style="display:none">⚙️ Admin</button>

<div id="raum" class="card">
<h2>Raum</h2>

<h3>ESP32 Status</h3>
<div id="espStatus" class="esp"></div>
<p id="espText"></p>
<p>📶 <span id="wifi"></span></p>
<p>🔋 <span id="volt"></span></p>

<div class="value">🌡️ <span id="temp">--</span></div>
<div class="value">🔥 <span id="kty">--</span></div>
<div class="value">💧 <span id="hum">--</span></div>
<div class="value">🫁 <span id="co2">--</span></div>

<div id="ampel" class="ampel"></div>
<p id="ampelText"></p>

<canvas id="roomChart"></canvas>
</div>

<div id="wetter" class="card" style="display:none">
<h2>🌦️ Wetter</h2>

<input id="cityInput" placeholder="Ort">
<button onclick="setCity()">Speichern</button>

<p id="city"></p>
<p>🌡️ Jetzt: <span id="wNow"></span></p>
<p>⏳ +1h: <span id="w1"></span></p>
<p>⏳ +2h: <span id="w2"></span></p>
</div>

<div id="settings" class="card" style="display:none">
<h2>Admin</h2>

<h3>🎮 Demo</h3>

<input id="tempSlider" type="range" min="-5" max="50" value="20">
<input id="ktySlider" type="range" min="-5" max="60" value="22">
<input id="humSlider" type="range" min="0" max="100" value="50">
<input id="co2Slider" type="range" min="400" max="2000" value="800">

<h3>🌦️ Wetter Demo</h3>
<input id="weatherSlider" type="range" min="-10" max="40" value="15">

<select id="weatherType">
<option>Clear</option>
<option>Clouds</option>
<option>Rain</option>
<option>Thunderstorm</option>
<option>Snow</option>
<option>Ash</option>
</select>

<h3>🔔 Alarm</h3>
<select id="alarmMode">
<option value="on">AN</option>
<option value="1">Pause 1h</option>
<option value="6">Pause 6h</option>
<option value="24">Pause 24h</option>
<option value="off">AUS</option>
</select>
<button onclick="saveAlarm()">Speichern</button>

<button onclick="startDemo()">🎮 Demo Start</button>
<button onclick="goLive()">📡 Live</button>

</div>

</div>

<script>

let alarmUntil=0;
function alarmActive(){ return Date.now()>alarmUntil; }

function getWeatherEmoji(type){
 if(type==="Clear") return "☀️";
 if(type==="Clouds") return "☁️";
 if(type==="Rain") return "🌧️";
 if(type==="Thunderstorm") return "⛈️";
 if(type==="Snow") return "❄️";
 if(type==="Ash") return "🌋";
 return "🌦️";
}

function saveAlarm(){
 let v=alarmMode.value;
 if(v==="on") alarmUntil=0;
 else if(v==="off") alarmUntil=Infinity;
 else alarmUntil=Date.now()+v*3600000;
}

function showAlert(text){
 if(!alarmActive()) return;

 let box=document.createElement("div");
 box.innerText=text;
 box.style.position="fixed";
 box.style.top="20px";
 box.style.left="50%";
 box.style.transform="translateX(-50%)";
 box.style.background="red";
 box.style.padding="20px";
 box.style.borderRadius="15px";
 document.body.appendChild(box);

 setTimeout(()=>box.remove(),10000);
}

function checkWeatherAlert(type){
 if(type==="Snow") showAlert("❄️ ACHTUNG SCHNEE!");
 if(type==="Thunderstorm") showAlert("⛈️ ACHTUNG GEWITTER!");
 if(type==="Ash") showAlert("🌋 ACHTUNG ASCHE!");
}

function updateAmpel(c){
 if(c<800){ampel.style.background="green";ampelText.innerText="Gut";}
 else if(c<1200){ampel.style.background="orange";ampelText.innerText="Mittel";}
 else{
  ampel.style.background="red";
  ampelText.innerText="Lüften!";
  showAlert("🫁 CO2 ZU HOCH! LÜFTEN!");
 }
}

function checkTempAlarm(t){
 if(t>=30) showAlert("🔥 EXTREM HEISS!");
 if(t<=-1) showAlert("❄️ EXTREM KALT!");
}

async function load(){
 let root=await (await fetch("https://finalfsat23roomc-default-rtdb.europe-west1.firebasedatabase.app/.json")).json();
 let mode=root.mode||"live";

 let v=(mode==="demo")?root.demo:await (await fetch("https://finalfsat23roomc-default-rtdb.europe-west1.firebasedatabase.app/data.json")).json();

 temp.innerText=v.temp;
 kty.innerText=v.kty;
 hum.innerText=v.hum;
 co2.innerText=v.co2;

 updateAmpel(v.co2);
 checkTempAlarm(v.temp);

 if(mode==="demo"){
  wNow.innerText=v.weatherTemp+"°C";
  city.innerText=getWeatherEmoji(v.weatherType)+" Worms";
  checkWeatherAlert(v.weatherType);
 }else{
  let res=await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=Worms&appid=dein_api_key&units=metric`);
  let data=await res.json();
  let type=data.list[0].weather[0].main;

  wNow.innerText=data.list[0].main.temp.toFixed(1)+"°C";
  w1.innerText=data.list[1].main.temp.toFixed(1)+"°C";
  w2.innerText=data.list[2].main.temp.toFixed(1)+"°C";

  city.innerText=getWeatherEmoji(type)+" Worms";
  checkWeatherAlert(type);
 }
}

function startDemo(){
 fetch("https://finalfsat23roomc-default-rtdb.europe-west1.firebasedatabase.app/.json",{
  method:"PATCH",
  body:JSON.stringify({
   mode:"demo",
   demo:{
    temp:+tempSlider.value,
    kty:+ktySlider.value,
    hum:+humSlider.value,
    co2:+co2Slider.value,
    weatherTemp:+weatherSlider.value,
    weatherType:weatherType.value
   }
  })
 });
}

function goLive(){
 fetch("https://finalfsat23roomc-default-rtdb.europe-west1.firebasedatabase.app/.json",{
  method:"PATCH",
  body:JSON.stringify({mode:"live"})
 });
}

setInterval(load,3000);

</script>

</body>
</html>
