<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CO2 PRO FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;margin:0}
.card{background:#222;padding:15px;margin:10px;border-radius:15px}
button{padding:12px;font-size:16px;width:90%;margin:5px;border-radius:10px;border:none}
.value{font-size:20px;margin:5px}
.ampel{width:70px;height:70px;border-radius:50%;margin:auto}
.esp{width:25px;height:25px;border-radius:50%;margin:auto;}
input,select{padding:10px;border-radius:10px;border:none;width:80%;margin:5px}

#alarmBox{
 position:fixed;
 top:20px;
 left:50%;
 transform:translateX(-50%);
 background:red;
 color:white;
 padding:15px;
 border-radius:10px;
 display:none;
 z-index:999;
}
</style>
</head>

<body>

<div id="alarmBox">⚠️ Alarm</div>

<div id="login">
<h2>Login</h2>
<button onclick="loginSchueler()">👨‍🎓 Schüler</button><br><br>
<input id="pw" placeholder="Admin Passwort">
<button onclick="loginAdmin()">👨‍🔧 Admin</button>
</div>

<div id="app" style="display:none">

<button onclick="show('raum')">🏠 Raum</button>
<button onclick="show('wetter')">🌦️ Wetter</button>
<button onclick="show('settings')" id="adminBtn" style="display:none">⚙️ Admin</button>

<!-- RAUM -->
<div id="raum" class="card">

<h3>ESP Status</h3>
<div id="espStatus" class="esp"></div>
<p id="espText"></p>
<p>📶 <span id="wifi"></span> dBm</p>
<p>🔋 <span id="volt"></span> V</p>

<div class="value">🌡️ <span id="temp">--</span> °C</div>
<div class="value">🔥 <span id="kty">--</span> °C</div>
<div class="value">💧 <span id="hum">--</span> %</div>
<div class="value">🫁 <span id="co2">--</span> ppm</div>

<canvas id="chart"></canvas>

</div>

<!-- WETTER -->
<div id="wetter" class="card" style="display:none">
<input id="cityInput" placeholder="Ort">
<button onclick="setCity()">Speichern</button>
<p id="city"></p>
<p>Jetzt: <span id="wNow"></span></p>
<p>+1h: <span id="w1"></span></p>
<p>+2h: <span id="w2"></span></p>
</div>

<!-- SETTINGS -->
<div id="settings" class="card" style="display:none">

<h3>🎮 Demo</h3>

<p>🌡️ <span id="tempVal">20</span></p>
<input id="tempSlider" type="range" min="-5" max="50" value="20">

<p>🔥 <span id="ktyVal">22</span></p>
<input id="ktySlider" type="range" min="-5" max="60" value="22">

<p>💧 <span id="humVal">50</span></p>
<input id="humSlider" type="range" min="0" max="100" value="50">

<p>🫁 <span id="co2Val">800</span></p>
<input id="co2Slider" type="range" min="400" max="2000" value="800">

<p>🌦️ <span id="weatherVal">15</span></p>
<input id="weatherSlider" type="range" min="-10" max="40" value="15">

<select id="weatherType">
<option>Clear</option>
<option>Rain</option>
<option>Snow</option>
<option>Thunderstorm</option>
<option>Ash</option>
</select>

<button onclick="startDemo()">Demo</button>
<button onclick="goLive()">Live</button>

</div>

</div>

<script>

const url = "https://finalfsat23roomc-default-rtdb.europe-west1.firebasedatabase.app/.json";
const apiKey = "e733d08921989a3920c3e85507388b6e";

let cityName = localStorage.getItem("city") || "Worms";

// ---------- LOGIN ----------
function loginSchueler(){
 document.getElementById("login").style.display="none";
 document.getElementById("app").style.display="block";
}

function loginAdmin(){
 let pw = document.getElementById("pw").value;
 if(pw==="12345"){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("adminBtn").style.display="inline-block";
 } else alert("Falsches Passwort");
}

// ---------- NAV ----------
function show(id){
 document.querySelectorAll(".card").forEach(x=>x.style.display="none");
 document.getElementById(id).style.display="block";
}

// ---------- CHART ----------
let chart;
window.onload = () => {
 chart = new Chart(document.getElementById("chart"),{
  type:"line",
  data:{labels:[],datasets:[
   {label:"Temp",data:[],borderColor:"orange"},
   {label:"KTY",data:[],borderColor:"red"},
   {label:"Hum",data:[],borderColor:"blue"},
   {label:"CO2",data:[],borderColor:"green"}
  ]}
 });
};

// ---------- DEMO SYNC ----------
function updateDemo(){
 fetch(url,{
  method:"PATCH",
  body:JSON.stringify({
   mode:"demo",
   demo:{
    temp:+tempSlider.value,
    kty:+ktySlider.value,
    hum:+humSlider.value,
    co2:+co2Slider.value,
    weatherTemp:+weatherSlider.value,
    weatherType:weatherType.value
   }
  })
 });
}

// Slider verbinden
[tempSlider,ktySlider,humSlider,co2Slider,weatherSlider].forEach(s=>{
 s.oninput=()=>{
  tempVal.innerText=tempSlider.value;
  ktyVal.innerText=ktySlider.value;
  humVal.innerText=humSlider.value;
  co2Val.innerText=co2Slider.value;
  weatherVal.innerText=weatherSlider.value;
  updateDemo();
 };
});

weatherType.onchange=updateDemo;

// ---------- LOAD ----------
async function load(){
 let d = await (await fetch(url)).json();

 let s=d.status||{};
 let diff=Date.now()-s.heartbeat;

 document.getElementById("espStatus").style.background=(diff<10000)?"green":"red";
 document.getElementById("espText").innerText=(diff<10000)?"Online":"Offline";

 wifi.innerText=s.rssi??"--";
 volt.innerText=s.voltage??"--";

 let v=(d.mode==="demo")?d.demo:d.data;
 if(!v) return;

 temp.innerText=v.temp??"--";
 kty.innerText=v.kty??"--";
 hum.innerText=v.hum??"--";
 co2.innerText=v.co2??"--";

 if(chart){
  let t=new Date().toLocaleTimeString();
  chart.data.labels.push(t);
  chart.data.datasets[0].data.push(v.temp||0);
  chart.data.datasets[1].data.push(v.kty||0);
  chart.data.datasets[2].data.push(v.hum||0);
  chart.data.datasets[3].data.push(v.co2||0);

  if(chart.data.labels.length>20){
   chart.data.labels.shift();
   chart.data.datasets.forEach(ds=>ds.data.shift());
  }

  chart.update();
 }
}

// ---------- WETTER ----------
function emoji(t){
 if(t.includes("Clear")) return "☀️";
 if(t.includes("Rain")) return "🌧️";
 if(t.includes("Snow")) return "❄️";
 if(t.includes("Thunderstorm")) return "⛈️";
 if(t.includes("Ash")) return "🌋";
 return "☁️";
}

function setCity(){
 let val=cityInput.value.trim();
 if(!val) return;
 cityName=val;
 localStorage.setItem("city", cityName);
 loadWeather();
}

async function loadWeather(){
 let res=await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${cityName}&appid=${apiKey}&units=metric`);
 let w=await res.json();

 if(w.cod!=="200") return;

 city.innerText="📍 "+w.city.name;

 wNow.innerText=emoji(w.list[0].weather[0].main)+" "+w.list[0].main.temp.toFixed(1)+"°C";
 w1.innerText=emoji(w.list[1].weather[0].main)+" "+w.list[1].main.temp.toFixed(1)+"°C";
 w2.innerText=emoji(w.list[2].weather[0].main)+" "+w.list[2].main.temp.toFixed(1)+"°C";
}

// ---------- MODES ----------
function startDemo(){updateDemo();}
function goLive(){fetch(url,{method:"PATCH",body:JSON.stringify({mode:"live"})});}

// ---------- LOOP ----------
setInterval(load,3000);
setInterval(loadWeather,10000);

</script>

</body>
</html>
