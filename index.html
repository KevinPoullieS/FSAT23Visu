<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CO2 PRO</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;margin:0}
.card{background:#222;padding:15px;margin:10px;border-radius:15px}
button{padding:15px;font-size:18px;width:90%;margin:5px;border-radius:10px}
.value{font-size:28px}
.ampel{width:80px;height:80px;border-radius:50%;margin:auto}
input{padding:10px;border-radius:10px;border:none;width:80%}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="pw" placeholder="Admin Passwort">
<button onclick="login()">Admin</button>
<button onclick="loginSchueler()">Schüler</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<button onclick="show('raum')">🏠 Raum</button>
<button onclick="show('wetter')">🌦️ Wetter</button>
<button onclick="show('handout')">📄 Handout</button>
<button onclick="show('settings')" id="adminBtn" style="display:none">⚙️ Admin</button>

<!-- RAUM -->
<div id="raum" class="card">
<div class="value">🌡️ <span id="temp"></span></div>
<div class="value">💧 <span id="hum"></span></div>
<div class="value">🫁 <span id="co2"></span></div>

<div id="ampel" class="ampel"></div>
<p id="ampelText"></p>

<canvas id="roomChart"></canvas>
</div>

<!-- WETTER -->
<div id="wetter" class="card" style="display:none">

<input id="cityInput" placeholder="Ort">
<button onclick="setCity()">Speichern</button>

<p id="city"></p>

<p>Jetzt: <span id="wNow"></span></p>
<p>+1h: <span id="w1"></span></p>
<p>+2h: <span id="w2"></span></p>
<p>07:00: <span id="w7"></span></p>
<p>18:00: <span id="w18"></span></p>

<canvas id="weatherChart"></canvas>

</div>

<!-- HANDOUT -->
<div id="handout" class="card" style="display:none">
<h2>📄 Handout</h2>

<a id="https://docs.google.com/document/d/1vZZlc7wwWzuf_9XTWxaG5xrb-6dRvmpX4tdyj-5-cx0/export?format=pdf" target="_blank">
<button>📥 Download</button>
</a>
</div>

<!-- ADMIN -->
<div id="settings" class="card" style="display:none">

<select id="switchTime">
<option value="5000">5s</option>
<option value="10000">10s</option>
<option value="60000">1min</option>
<option value="120000">2min</option>
</select>

<button onclick="saveSettings()">Speichern</button>

<h3>Handout Link</h3>
<input id="handoutInput" placeholder="Link">
<button onclick="saveHandout()">Speichern</button>

<button onclick="startDemo()">Demo Start</button>
<button onclick="stopDemo()">Demo Stop</button>

<button id="installBtn" style="display:none">📲 Install</button>

</div>

</div>

<script>

// CONFIG
let url="https://finalfsat23roomc-default-rtdb.europe-west1.firebasedatabase.app/data.json";
let apiKey="e733d08921989a3920c3e85507388b6e";
let cityName="Worms";

let admin=false;

// LOGIN
function login(){
 if(pw.value==="12345"){
  admin=true;
  start();
  adminBtn.style.display="block";
 }
}
function loginSchueler(){start();}
function start(){
 login.style.display="none";
 app.style.display="block";
}

// NAV
function show(id){
 document.querySelectorAll(".card").forEach(x=>x.style.display="none");
 document.getElementById(id).style.display="block";
}

// AMPEL
function updateAmpel(c){
 if(c<800){ampel.style.background="green";ampelText.innerText="Gut";}
 else if(c<1200){ampel.style.background="orange";}
 else{
  ampel.style.background="red";
  notify("❗ Lüften! CO2 "+c);
 }
}

// CHART
let roomChart=new Chart(document.getElementById("roomChart"),{
 type:"line",
 data:{labels:[],datasets:[
  {label:"Temp",data:[]},
  {label:"Hum",data:[]},
  {label:"CO2",data:[]}
 ]}
});

// LOAD
async function load(){
 let res=await fetch(url);
 let d=await res.json();

 temp.innerText=d.temp;
 hum.innerText=d.hum;
 co2.innerText=d.co2;

 updateAmpel(d.co2);

 if(d.handout){
  handoutLink.href=d.handout;
 }

 let t=new Date().toLocaleTimeString();

 roomChart.data.labels.push(t);
 roomChart.data.datasets[0].data.push(d.temp);
 roomChart.data.datasets[1].data.push(d.hum);
 roomChart.data.datasets[2].data.push(d.co2);

 if(roomChart.data.labels.length>20){
  roomChart.data.labels.shift();
  roomChart.data.datasets.forEach(ds=>ds.data.shift());
 }

 roomChart.update();
}

// WETTER
function setCity(){cityName=cityInput.value;}

async function loadWeather(){
 let res=await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${cityName}&appid=${apiKey}&units=metric`);
 let d=await res.json();

 city.innerText=d.city.name;

 let l=d.list;

 wNow.innerText=l[0].main.temp.toFixed(1);
 w1.innerText=l[1].main.temp.toFixed(1);
 w2.innerText=l[2].main.temp.toFixed(1);

 let t7=l.find(x=>x.dt_txt.includes("06:00")||x.dt_txt.includes("09:00"));
 let t18=l.find(x=>x.dt_txt.includes("18:00"));

 if(t7) w7.innerText=t7.main.temp.toFixed(1);
 if(t18) w18.innerText=t18.main.temp.toFixed(1);
}

// SETTINGS
function saveSettings(){
 fetch(url,{method:"PATCH",body:JSON.stringify({switchTime:Number(switchTime.value)})});
}

// HANDOUT
function saveHandout(){
 let link=handoutInput.value;
 fetch(url,{method:"PATCH",body:JSON.stringify({handout:link})});
}

// DEMO
let demo=null;
function startDemo(){
 demo=setInterval(()=>{
  fetch(url,{method:"PATCH",body:JSON.stringify({
   temp:20+Math.random()*5,
   hum:40+Math.random()*20,
   co2:400+Math.random()*1200
  })});
 },3000);
}
function stopDemo(){clearInterval(demo);}

// PUSH
function notify(msg){
 if(Notification.permission==="granted"){
  new Notification(msg);
 } else {
  Notification.requestPermission();
 }
}

// INSTALL
let deferredPrompt;
window.addEventListener("beforeinstallprompt",e=>{
 e.preventDefault();
 deferredPrompt=e;
 installBtn.style.display="block";
});
installBtn.onclick=()=>deferredPrompt.prompt();

// SERVICE WORKER
if("serviceWorker" in navigator){
 navigator.serviceWorker.register("service-worker.js");
}

setInterval(load,3000);
setInterval(loadWeather,10000);

</script>

</body>
</html>
