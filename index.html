<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CO2 PRO FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;margin:0}
.card{background:#222;padding:15px;margin:10px;border-radius:15px}
button{padding:12px;font-size:16px;width:90%;margin:5px;border-radius:10px;border:none}
.value{font-size:20px;margin:5px}
.ampel{width:70px;height:70px;border-radius:50%;margin:auto}
input,select{padding:10px;border-radius:10px;border:none;width:80%;margin:5px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<button onclick="loginSchueler()">👨‍🎓 Schüler</button><br><br>
<input id="pw" placeholder="Admin Passwort">
<button onclick="loginAdmin()">👨‍🔧 Admin</button>
<p id="error" style="color:red;"></p>
</div>

<!-- APP -->
<div id="app" style="display:none">

<button onclick="show('raum')">🏠 Raum</button>
<button onclick="show('wetter')">🌦️ Wetter</button>
<button onclick="show('handout')">📄 Handout</button>
<button onclick="show('settings')" id="adminBtn" style="display:none">⚙️ Admin</button>

<!-- RAUM -->
<div id="raum" class="card">
<h2>Raum</h2>

<h3>ESP32 Status</h3>
<div id="espStatus" class="ampel"></div>
<p id="espText"></p>

<p>📶 Signal: <span id="wifi"></span></p>
<p>🔋 Spannung: <span id="volt"></span> V</p>

<div class="value">🌡️ DHT: <span id="temp">--</span></div>
<div class="value">🔥 KTY: <span id="kty">--</span></div>
<div class="value">💧 <span id="hum">--</span></div>
<div class="value">🫁 <span id="co2">--</span></div>

<div id="ampel" class="ampel"></div>
<p id="ampelText"></p>

<canvas id="roomChart"></canvas>
</div>

<!-- WETTER -->
<div id="wetter" class="card" style="display:none">
<h2>Wetter</h2>

<input id="cityInput" placeholder="Ort">
<button onclick="setCity()">Speichern</button>

<p id="city"></p>
<p id="wNow"></p>
</div>

<!-- HANDOUT -->
<div id="handout" class="card" style="display:none">
<h2>📄 Handout</h2>
<a id="handoutLink" target="_blank">
<button>📥 Download</button>
</a>
</div>

<!-- ADMIN -->
<div id="settings" class="card" style="display:none">

<h2>Admin</h2>

<h3>🎮 Demo</h3>

<label>Temp</label>
<input id="tempSlider" type="range" min="-5" max="50" value="20">

<label>Feuchte</label>
<input id="humSlider" type="range" min="0" max="100" value="50">

<label>CO2</label>
<input id="co2Slider" type="range" min="400" max="2000" value="800">

<label>Wetter Temp</label>
<input id="weatherSlider" type="range" min="-10" max="40" value="15">

<select id="weatherType">
<option>Clear</option>
<option>Clouds</option>
<option>Rain</option>
<option>Thunderstorm</option>
<option>Snow</option>
<option>Ash</option>
</select>

<button onclick="startDemo()">🎮 Demo Start</button>
<button onclick="goLive()">📡 Live</button>

<h3>🔔 Alarm</h3>
<select id="alarmMode">
<option value="on">AN</option>
<option value="1">Pause 1h</option>
<option value="6">Pause 6h</option>
<option value="24">Pause 24h</option>
<option value="off">AUS</option>
</select>

<button onclick="saveAlarm()">Speichern</button>

</div>

</div>

<script>

// CONFIG
let url="https://finalfsat23roomc-default-rtdb.europe-west1.firebasedatabase.app/data.json";
let apiKey="e733d08921989a3920c3e85507388b6e";
let cityName="Worms";

// LOGIN
function loginAdmin(){
 if(pw.value==="12345"){
  login.style.display="none";
  app.style.display="block";
  adminBtn.style.display="block";
 } else error.innerText="Falsches Passwort!";
}
function loginSchueler(){
 login.style.display="none";
 app.style.display="block";
}

// NAV
function show(id){
 document.querySelectorAll(".card").forEach(x=>x.style.display="none");
 document.getElementById(id).style.display="block";
}

// CHART
let chart=new Chart(document.getElementById("roomChart"),{
 type:"line",
 data:{labels:[],datasets:[
  {label:"DHT",data:[],borderColor:"orange",yAxisID:"y"},
  {label:"KTY",data:[],borderColor:"red",yAxisID:"y"},
  {label:"Hum",data:[],borderColor:"blue",yAxisID:"y1"},
  {label:"CO2",data:[],borderColor:"green",yAxisID:"y1"}
 ]},
 options:{
  scales:{
   y:{position:"left"},
   y1:{position:"right",grid:{drawOnChartArea:false}}
  }
 }
});

// RESET CHART
function clearChart(){
 chart.data.labels=[];
 chart.data.datasets.forEach(d=>d.data=[]);
 chart.update();
}

// LOAD
async function load(){

 let d=await (await fetch(url)).json();

 // ESP STATUS
 let s=d.status||{};
 let diff=(Date.now()-s.heartbeat)/1000;

 if(diff<10){
  espStatus.style.background="green";
  espText.innerText="Verbunden";
 }else{
  espStatus.style.background="red";
  espText.innerText="Offline";
 }

 wifi.innerText=s.rssi+" dBm";
 volt.innerText=(s.voltage||0).toFixed(2);

 // MODE
 let mode=d.mode||"live";
 let v=(mode==="demo")?{
  temp:d.demo.temp,
  kty:d.demo.temp+2,
  hum:d.demo.hum,
  co2:d.demo.co2
 }:d.data;

 temp.innerText=v.temp;
 kty.innerText=v.kty;
 hum.innerText=v.hum;
 co2.innerText=v.co2;

 updateAmpel(v.co2);

 // CHART
 let t=new Date().toLocaleTimeString();
 chart.data.labels.push(t);
 chart.data.datasets[0].data.push(v.temp);
 chart.data.datasets[1].data.push(v.kty);
 chart.data.datasets[2].data.push(v.hum);
 chart.data.datasets[3].data.push(v.co2);

 if(chart.data.labels.length>20){
  chart.data.labels.shift();
  chart.data.datasets.forEach(ds=>ds.data.shift());
 }

 chart.update();

 // HANDOUT
 if(d.handout) handoutLink.href=d.handout;

 checkAlarm(d,v.co2);
}

// AMPEL
function updateAmpel(c){
 if(c<800){ampel.style.background="green";ampelText.innerText="Gut";}
 else if(c<1200){ampel.style.background="orange";ampelText.innerText="Mittel";}
 else{ampel.style.background="red";ampelText.innerText="Lüften!";}
}

// DEMO
function startDemo(){
 fetch(url,{
  method:"PATCH",
  body:JSON.stringify({
    mode:"demo",
    demo:{
      temp:+tempSlider.value,
      hum:+humSlider.value,
      co2:+co2Slider.value,
      weatherTemp:+weatherSlider.value,
      weatherType:weatherType.value
    }
  })
 });
 clearChart();
}

// LIVE
function goLive(){
 fetch(url,{method:"PATCH",body:JSON.stringify({mode:"live"})});
 clearChart();
}

// WETTER
function setCity(){cityName=cityInput.value;}

async function loadWeather(){

 let d=await (await fetch(url)).json();

 if(d.mode==="demo"){
  let w=d.demo.weatherType;
  let t=d.demo.weatherTemp;

  let emoji="☁️";
  if(w==="Clear") emoji="☀️";
  if(w==="Rain") emoji="🌧️";
  if(w==="Thunderstorm") emoji="⛈️";
  if(w==="Snow") emoji="❄️";
  if(w==="Ash") emoji="🌋";

  city.innerText="📍 Demo";
  wNow.innerText=emoji+" "+t+"°C";
  return;
 }

 let res=await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${cityName}&appid=${apiKey}&units=metric`);
 let w=await res.json();

 let type=w.list[0].weather[0].main;
 let t=w.list[0].main.temp;

 let emoji="☁️";
 if(type.includes("Clear")) emoji="☀️";
 else if(type.includes("Rain")) emoji="🌧️";
 else if(type.includes("Thunderstorm")) emoji="⛈️";
 else if(type.includes("Snow")) emoji="❄️";
 else if(type.includes("Mist")) emoji="🌫️";

 city.innerText="📍 "+w.city.name;
 wNow.innerText=emoji+" "+t.toFixed(1)+"°C";

 if(type.includes("Rain")||type.includes("Ash")){
  alert("🌧️ Fenster zu!");
 }
}

// ALARM
function saveAlarm(){
 fetch(url,{
  method:"PATCH",
  body:JSON.stringify({
    alarmMode:alarmMode.value,
    alarmTime:Date.now()
  })
 });
}

function checkAlarmAllowed(d){
 if(!d.alarmMode||d.alarmMode==="on") return true;
 if(d.alarmMode==="off") return false;

 let h=Number(d.alarmMode);
 return ((Date.now()-d.alarmTime)/(1000*60*60))>h;
}

function checkAlarm(d,c){
 if(checkAlarmAllowed(d)&&c>1200){
  alert("❗ Lüften!");
 }
}

// LOOP
setInterval(load,3000);
setInterval(loadWeather,10000);

</script>

</body>
</html>
