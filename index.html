<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CO2 PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;margin:0}
.card{background:#222;padding:15px;margin:10px;border-radius:15px}
button{padding:15px;font-size:18px;width:90%;margin:5px;border-radius:10px;border:none}
.value{font-size:24px}
.ampel{width:80px;height:80px;border-radius:50%;margin:auto}
input{padding:10px;border-radius:10px;border:none;width:80%}
label{display:block;margin-top:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<button onclick="loginSchueler()">👨‍🎓 Schüler</button>
<br><br>
<input id="pw" placeholder="Admin Passwort">
<button onclick="loginAdmin()">👨‍🔧 Admin</button>
<p id="error" style="color:red;"></p>
</div>

<!-- APP -->
<div id="app" style="display:none">

<button onclick="show('raum')">🏠 Raum</button>
<button onclick="show('wetter')">🌦️ Wetter</button>
<button onclick="show('handout')">📄 Handout</button>
<button onclick="show('settings')" id="adminBtn" style="display:none">⚙️ Admin</button>

<!-- RAUM -->
<div id="raum" class="card">
<h2>Raum</h2>

<div class="value">🌡️ DHT: <span id="temp">--</span> °C</div>
<div class="value">🔥 KTY: <span id="kty">--</span> °C</div>
<div class="value">💧 <span id="hum">--</span> %</div>
<div class="value">🫁 <span id="co2">--</span> ppm</div>

<div id="ampel" class="ampel"></div>
<p id="ampelText"></p>

<canvas id="roomChart"></canvas>
</div>

<!-- WETTER -->
<div id="wetter" class="card" style="display:none">
<h2>Wetter</h2>

<input id="cityInput" placeholder="Ort">
<button onclick="setCity()">Speichern</button>

<p id="city"></p>

<p>Jetzt: <span id="wNow"></span></p>
<p>+1h: <span id="w1"></span></p>
<p>+2h: <span id="w2"></span></p>
<p>07:00: <span id="w7"></span></p>
<p>18:00: <span id="w18"></span></p>
</div>

<!-- HANDOUT -->
<div id="handout" class="card" style="display:none">
<h2>📄 Handout</h2>
<a id="handoutLink" target="_blank">
<button>📥 Download</button>
</a>
</div>

<!-- ADMIN -->
<div id="settings" class="card" style="display:none">

<h2>Admin</h2>

<select id="switchTime">
<option value="5000">5s</option>
<option value="10000">10s</option>
<option value="60000">1min</option>
<option value="120000">2min</option>
</select>

<button onclick="saveSettings()">Speichern</button>

<h3>Handout Link</h3>
<input id="handoutInput">
<button onclick="saveHandout()">Speichern</button>

<h3>🎮 Demo</h3>

<label>Temp: <span id="tempVal">20</span></label>
<input type="range" min="-5" max="50" value="20" id="tempSlider">

<label>Feuchte: <span id="humVal">50</span></label>
<input type="range" min="0" max="100" value="50" id="humSlider">

<label>CO2: <span id="co2Val">800</span></label>
<input type="range" min="400" max="2000" value="800" id="co2Slider">

<button onclick="startDemo()">Start</button>
<button onclick="stopDemo()">Stop</button>

</div>

</div>

<script>

// CONFIG
let url="https://finalfsat23roomc-default-rtdb.europe-west1.firebasedatabase.app/data.json";
let apiKey="e733d08921989a3920c3e85507388b6e";
let cityName="Worms";
let admin=false;

// LOGIN
function loginAdmin(){
 if(pw.value==="12345"){
  admin=true;
  start();
  adminBtn.style.display="block";
 } else {
  error.innerText="Falsches Passwort!";
 }
}
function loginSchueler(){start();}
function start(){
 login.style.display="none";
 app.style.display="block";
}

// NAV
function show(id){
 document.querySelectorAll(".card").forEach(x=>x.style.display="none");
 document.getElementById(id).style.display="block";
}

// AMPEL
function updateAmpel(c){
 if(c<800){ampel.style.background="green";ampelText.innerText="Gut";}
 else if(c<1200){ampel.style.background="orange";}
 else{ampel.style.background="red";}
}

// CHART
let roomChart=new Chart(document.getElementById("roomChart"),{
 type:"line",
 data:{
  labels:[],
  datasets:[
   {label:"DHT Temp",data:[]},
   {label:"KTY Temp",data:[]},
   {label:"Hum",data:[]},
   {label:"CO2",data:[]}
  ]
 }
});

// LOAD
async function load(){
 let d=await (await fetch(url)).json();

 temp.innerText=d.temp;
 kty.innerText=d.kty;
 hum.innerText=d.hum;
 co2.innerText=d.co2;

 updateAmpel(d.co2);

 if(d.handout) handoutLink.href=d.handout;

 let t=new Date().toLocaleTimeString();

 roomChart.data.labels.push(t);
 roomChart.data.datasets[0].data.push(d.temp);
 roomChart.data.datasets[1].data.push(d.kty);
 roomChart.data.datasets[2].data.push(d.hum);
 roomChart.data.datasets[3].data.push(d.co2);

 if(roomChart.data.labels.length>20){
  roomChart.data.labels.shift();
  roomChart.data.datasets.forEach(ds=>ds.data.shift());
 }

 roomChart.update();
}

// WETTER
function setCity(){cityName=cityInput.value;}
async function loadWeather(){
 let d=await (await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${cityName}&appid=${apiKey}&units=metric`)).json();
 city.innerText=d.city.name;
 let l=d.list;
 wNow.innerText=l[0].main.temp.toFixed(1);
 w1.innerText=l[1].main.temp.toFixed(1);
 w2.innerText=l[2].main.temp.toFixed(1);
}

// SETTINGS
function saveSettings(){
 fetch(url,{method:"PATCH",body:JSON.stringify({switchTime:Number(switchTime.value)})});
}

// HANDOUT
function saveHandout(){
 fetch(url,{method:"PATCH",body:JSON.stringify({handout:handoutInput.value})});
}

// SLIDER
tempSlider.oninput=()=>tempVal.innerText=tempSlider.value;
humSlider.oninput=()=>humVal.innerText=humSlider.value;
co2Slider.oninput=()=>co2Val.innerText=co2Slider.value;

// DEMO
let demo=null;
function startDemo(){
 if(demo) return;
 demo=setInterval(()=>{
  fetch(url,{method:"PATCH",body:JSON.stringify({
   temp:Number(tempSlider.value),
   kty:Number(tempSlider.value)+2,
   hum:Number(humSlider.value),
   co2:Number(co2Slider.value)
  })});
 },1000);
}

function stopDemo(){
 clearInterval(demo);
 demo=null;

 fetch(url,{method:"PATCH",body:JSON.stringify({
  temp:22,
  kty:25,
  hum:45,
  co2:800
 })});
}

// LOOP
setInterval(load,3000);
setInterval(loadWeather,10000);

</script>

</body>
</html>
