<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CO2 PRO ULTIMATE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;margin:0}
.card{background:#222;padding:15px;margin:10px;border-radius:15px}
button{padding:15px;font-size:18px;width:90%;margin:5px;border-radius:10px;border:none}
.value{font-size:20px}
.ampel{width:80px;height:80px;border-radius:50%;margin:auto}
input,select{padding:10px;border-radius:10px;border:none;width:80%}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<button onclick="loginSchueler()">👨‍🎓 Schüler</button><br><br>
<input id="pw" placeholder="Admin Passwort">
<button onclick="loginAdmin()">👨‍🔧 Admin</button>
<p id="error" style="color:red;"></p>
</div>

<!-- APP -->
<div id="app" style="display:none">

<button onclick="show('raum')">🏠 Raum</button>
<button onclick="show('wetter')">🌦️ Wetter</button>
<button onclick="show('handout')">📄 Handout</button>
<button onclick="show('settings')" id="adminBtn" style="display:none">⚙️ Admin</button>

<!-- RAUM -->
<div id="raum" class="card">
<h2>Raum</h2>

<div class="value">🌡️ DHT: <span id="temp">--</span></div>
<div class="value">🔥 KTY: <span id="kty">--</span></div>
<div class="value">💧 <span id="hum">--</span></div>
<div class="value">🫁 <span id="co2">--</span></div>

<div id="ampel" class="ampel"></div>
<p id="ampelText"></p>

<canvas id="roomChart"></canvas>
</div>

<!-- WETTER -->
<div id="wetter" class="card" style="display:none">
<h2>Wetter</h2>

<input id="cityInput" placeholder="Ort">
<button onclick="setCity()">Speichern</button>

<p id="city"></p>
<p id="wNow"></p>
<p id="w1"></p>
<p id="w2"></p>

</div>

<!-- HANDOUT -->
<div id="handout" class="card" style="display:none">
<h2>📄 Handout</h2>
<a id="handoutLink" target="_blank">
<button>Download</button>
</a>
</div>

<!-- ADMIN -->
<div id="settings" class="card" style="display:none">

<h2>Admin</h2>

<button onclick="startDemo()">🎮 Demo</button>
<button onclick="goLive()">📡 Live</button>

<h3>🔔 Alarm</h3>
<select id="alarmMode">
<option value="on">AN</option>
<option value="1">Pause 1h</option>
<option value="6">Pause 6h</option>
<option value="24">Pause 24h</option>
<option value="off">AUS</option>
</select>

<button onclick="saveAlarm()">Speichern</button>

</div>

</div>

<script>

// CONFIG
let url="https://finalfsat23roomc-default-rtdb.europe-west1.firebasedatabase.app/data.json";
let apiKey="e733d08921989a3920c3e85507388b6e";
let cityName="Worms";

let demoMode=false;
let demo=null;

// LOGIN
function loginAdmin(){
 if(pw.value==="12345"){
  start();
  adminBtn.style.display="block";
 } else error.innerText="Falsch!";
}
function loginSchueler(){start();}
function start(){
 login.style.display="none";
 app.style.display="block";
}

// NAV
function show(id){
 document.querySelectorAll(".card").forEach(x=>x.style.display="none");
 document.getElementById(id).style.display="block";
}

// AMPEL
function updateAmpel(c){
 if(c<800){ampel.style.background="green";ampelText.innerText="Gut";}
 else if(c<1200){ampel.style.background="orange";}
 else{ampel.style.background="red";ampelText.innerText="Lüften!";}
}

// CHART
let roomChart=new Chart(document.getElementById("roomChart"),{
 type:"line",
 data:{
  labels:[],
  datasets:[
   {label:"DHT",data:[],borderColor:"orange",yAxisID:"y"},
   {label:"KTY",data:[],borderColor:"red",yAxisID:"y"},
   {label:"Hum",data:[],borderColor:"blue",yAxisID:"y1"},
   {label:"CO2",data:[],borderColor:"green",yAxisID:"y1"}
  ]
 },
 options:{
  scales:{
   y:{position:"left"},
   y1:{position:"right",grid:{drawOnChartArea:false}}
  }
 }
});

// CLEAR GRAPH
function clearChart(){
 roomChart.data.labels=[];
 roomChart.data.datasets.forEach(ds=>ds.data=[]);
 roomChart.update();
}

// LOAD
async function load(){

 if(demoMode) return;

 let d=await (await fetch(url)).json();

 temp.innerText=d.temp;
 kty.innerText=d.kty;
 hum.innerText=d.hum;
 co2.innerText=d.co2;

 updateAmpel(d.co2);

 if(d.handout) handoutLink.href=d.handout;

 checkAlarm(d);

 let t=new Date().toLocaleTimeString();

 roomChart.data.labels.push(t);
 roomChart.data.datasets[0].data.push(d.temp);
 roomChart.data.datasets[1].data.push(d.kty);
 roomChart.data.datasets[2].data.push(d.hum);
 roomChart.data.datasets[3].data.push(d.co2);

 roomChart.update();
}

// DEMO
function startDemo(){
 demoMode=true;
 clearChart();

 demo=setInterval(()=>{
  let t=20+Math.random()*5;
  let h=40+Math.random()*20;
  let c=400+Math.random()*1200;

  temp.innerText=t;
  kty.innerText=t+2;
  hum.innerText=h;
  co2.innerText=c;

  updateAmpel(c);

  let time=new Date().toLocaleTimeString();

  roomChart.data.labels.push(time);
  roomChart.data.datasets[0].data.push(t);
  roomChart.data.datasets[1].data.push(t+2);
  roomChart.data.datasets[2].data.push(h);
  roomChart.data.datasets[3].data.push(c);

  roomChart.update();

 },1000);
}

// LIVE
function goLive(){
 demoMode=false;
 clearInterval(demo);
 clearChart();
}

// WETTER
function setCity(){cityName=cityInput.value;}

async function loadWeather(){

 let d=await (await fetch(
  `https://api.openweathermap.org/data/2.5/forecast?q=${cityName}&appid=${apiKey}&units=metric`
 )).json();

 city.innerText="📍 "+d.city.name;

 let w=d.list[0].weather[0].main;
 let t=d.list[0].main.temp;

 let emoji="☁️";

 if(w.includes("Clear")) emoji="☀️";
 else if(w.includes("Cloud")) emoji="☁️";
 else if(w.includes("Rain")) emoji="🌧️";
 else if(w.includes("Thunderstorm")) emoji="⛈️";
 else if(w.includes("Snow")) emoji="❄️";
 else if(w.includes("Mist")) emoji="🌫️";
 else if(w.includes("Ash")) emoji="🌋";

 wNow.innerText=emoji+" "+t.toFixed(1)+"°C";
 w1.innerText="+1h: "+d.list[1].main.temp.toFixed(1);
 w2.innerText="+2h: "+d.list[2].main.temp.toFixed(1);

 checkWeatherAlarm(w);
}

// ALARM SYSTEM
function saveAlarm(){
 fetch(url,{
  method:"PATCH",
  body:JSON.stringify({
   alarmMode:alarmMode.value,
   alarmTime:Date.now()
  })
 });
}

function checkAlarmAllowed(d){
 if(!d.alarmMode||d.alarmMode==="on") return true;
 if(d.alarmMode==="off") return false;

 let h=Number(d.alarmMode);
 let diff=(Date.now()- (d.alarmTime||0))/(1000*60*60);

 return diff>h;
}

function checkAlarm(d){
 if(checkAlarmAllowed(d)){
  if(d.co2>1200){
   alert("❗ Lüften! Fenster auf!");
  }
 }
}

function checkWeatherAlarm(w){
 if(w.includes("Rain")||w.includes("Ash")){
  alert("🌧️ Fenster zu!");
 }
}

// LOOP
setInterval(load,3000);
setInterval(loadWeather,10000);

</script>

</body>
</html>
