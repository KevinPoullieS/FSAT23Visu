<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CO2 PRO FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;margin:0}
.card{background:#222;padding:15px;margin:10px;border-radius:15px}
button{padding:12px;font-size:16px;width:90%;margin:5px;border-radius:10px;border:none}
.value{font-size:20px;margin:5px}
.ampel{width:70px;height:70px;border-radius:50%;margin:auto}
.esp{width:25px;height:25px;border-radius:50%;margin:auto;}
input,select{padding:10px;border-radius:10px;border:none;width:80%;margin:5px}
</style>
</head>

<body>

<div id="login">
<h2>Login</h2>
<button onclick="loginSchueler()">👨‍🎓 Schüler</button><br><br>
<input id="pw" placeholder="Admin Passwort">
<button onclick="loginAdmin()">👨‍🔧 Admin</button>
<p id="error" style="color:red;"></p>
</div>

<div id="app" style="display:none">

<button onclick="show('raum')">🏠 Raum</button>
<button onclick="show('wetter')">🌦️ Wetter</button>
<button onclick="show('handout')">📄 Handout</button>
<button onclick="show('settings')" id="adminBtn" style="display:none">⚙️ Admin</button>

<div id="raum" class="card">
<h2>Raum</h2>

<h3>ESP32 Status</h3>
<div id="espStatus" class="esp"></div>
<p id="espText"></p>
<p>📶 <span id="wifi"></span> dBm</p>
<p>🔋 <span id="volt"></span> V</p>

<div class="value">🌡️ DHT: <span id="temp">--</span></div>
<div class="value">🔥 KTY: <span id="kty">--</span></div>
<div class="value">💧 <span id="hum">--</span></div>
<div class="value">🫁 <span id="co2">--</span></div>

<h3>🌬️ Luftqualitäts-Ampel</h3>
<div id="ampel" class="ampel"></div>
<p id="ampelText"></p>

<canvas id="roomChart"></canvas>
</div>

<div id="wetter" class="card" style="display:none">
<h2>Wetter</h2>

<input id="cityInput" placeholder="Ort">
<button onclick="setCity()">Speichern</button>

<p id="city"></p>
<p>Jetzt: <span id="wNow"></span></p>
<p>+1h: <span id="w1"></span></p>
<p>+2h: <span id="w2"></span></p>
<p>Morgen 07:00: <span id="w7"></span></p>
</div>

<div id="handout" class="card" style="display:none">
<h2>📄 Handout</h2>
<button onclick="openPreview()">👁️ Vorschau</button>
<button onclick="downloadHandout()">📥 Download</button>
</div>

<div id="settings" class="card" style="display:none">
<h2>Admin</h2>

<h3>🎮 Demo</h3>

<p>🌡️ Temp: <span id="tempVal">20</span> °C</p>
<input id="tempSlider" type="range" min="-5" max="50" value="20">

<p>🔥 KTY: <span id="ktyVal">22</span> °C</p>
<input id="ktySlider" type="range" min="-5" max="60" value="22">

<p>💧 Feuchte: <span id="humVal">50</span> %</p>
<input id="humSlider" type="range" min="0" max="100" value="50">

<p>🫁 CO2: <span id="co2Val">800</span> ppm</p>
<input id="co2Slider" type="range" min="400" max="2000" value="800">

<p>🌦️ Wetter: <span id="weatherVal">15</span> °C</p>
<input id="weatherSlider" type="range" min="-10" max="40" value="15">

<select id="weatherType">
<option>Clear</option>
<option>Clouds</option>
<option>Rain</option>
<option>Thunderstorm</option>
<option>Snow</option>
<option>Ash</option>
</select>

<button onclick="startDemo()">🎮 Demo Start</button>
<button onclick="goLive()">📡 Live</button>

<h3>🔔 Alarm</h3>
<select id="alarmMode">
<option value="on">AN</option>
<option value="1">Pause 1h</option>
<option value="6">Pause 6h</option>
<option value="24">Pause 24h</option>
<option value="off">AUS</option>
</select>
<button onclick="saveAlarm()">Speichern</button>

</div>

</div>

<script>

let urlData="https://finalfsat23roomc-default-rtdb.europe-west1.firebasedatabase.app/data.json";
let urlRoot="https://finalfsat23roomc-default-rtdb.europe-west1.firebasedatabase.app/.json";
let apiKey="e733d08921989a3920c3e85507388b6e";
let cityName="Worms";

let handoutURL="";

// LOGIN
function loginAdmin(){
 if(pw.value==="12345"){
  login.style.display="none";
  app.style.display="block";
  adminBtn.style.display="block";
 } else error.innerText="Falsch!";
}
function loginSchueler(){
 login.style.display="none";
 app.style.display="block";
}

// NAV
function show(id){
 document.querySelectorAll(".card").forEach(x=>x.style.display="none");
 document.getElementById(id).style.display="block";
}

// SLIDER
tempSlider.oninput=()=>tempVal.innerText=tempSlider.value;
ktySlider.oninput=()=>ktyVal.innerText=ktySlider.value;
humSlider.oninput=()=>humVal.innerText=humSlider.value;
co2Slider.oninput=()=>co2Val.innerText=co2Slider.value;
weatherSlider.oninput=()=>weatherVal.innerText=weatherSlider.value;

// CHART
let chart=new Chart(roomChart,{
 type:"line",
 data:{labels:[],datasets:[
  {label:"DHT",data:[],borderColor:"orange",yAxisID:"y"},
  {label:"KTY",data:[],borderColor:"red",yAxisID:"y"},
  {label:"Hum",data:[],borderColor:"blue",yAxisID:"y1"},
  {label:"CO2",data:[],borderColor:"green",yAxisID:"y1"}
 ]},
 options:{scales:{y:{position:"left"},y1:{position:"right",grid:{drawOnChartArea:false}}}}
});

// LOAD
async function load(){
 let d=await (await fetch(urlData)).json();
 let root=await (await fetch(urlRoot)).json();

 setHandout(root);

 let s=root.status||{};
 let diff=(Date.now()-s.heartbeat)/1000;

 espStatus.style.background=diff<10?"green":"red";
 espText.innerText=diff<10?"Online":"Offline";

 wifi.innerText=s.rssi||"--";
 volt.innerText=(s.voltage||0).toFixed(2);

 let mode=root.mode||"live";

 let v=(mode==="demo")?{
  temp:root.demo.temp,
  kty:root.demo.kty,
  hum:root.demo.hum,
  co2:root.demo.co2
 }:d;

 temp.innerText=v.temp;
 kty.innerText=v.kty;
 hum.innerText=v.hum;
 co2.innerText=v.co2;

 updateAmpel(v.co2);

 let t=new Date().toLocaleTimeString();

 chart.data.labels.push(t);
 chart.data.datasets[0].data.push(v.temp);
 chart.data.datasets[1].data.push(v.kty);
 chart.data.datasets[2].data.push(v.hum);
 chart.data.datasets[3].data.push(v.co2);

 if(chart.data.labels.length>20){
  chart.data.labels.shift();
  chart.data.datasets.forEach(ds=>ds.data.shift());
 }

 chart.update();

 checkAlarm(root,v.co2);
}

// AMPEL
function updateAmpel(c){
 if(c<800){ampel.style.background="green";ampelText.innerText="Gut";}
 else if(c<1200){ampel.style.background="orange";ampelText.innerText="Mittel";}
 else{ampel.style.background="red";ampelText.innerText="Lüften!";}
}

// DEMO
function startDemo(){
 fetch(urlRoot,{
  method:"PATCH",
  body:JSON.stringify({
    mode:"demo",
    demo:{
      temp:+tempSlider.value,
      kty:+ktySlider.value,
      hum:+humSlider.value,
      co2:+co2Slider.value,
      weatherTemp:+weatherSlider.value,
      weatherType:weatherType.value
    }
  })
 });
 chart.data.labels=[];
 chart.data.datasets.forEach(ds=>ds.data=[]);
}

// LIVE
function goLive(){
 fetch(urlRoot,{method:"PATCH",body:JSON.stringify({mode:"live"})});
 chart.data.labels=[];
 chart.data.datasets.forEach(ds=>ds.data=[]);
}

// HANDOUT
function setHandout(d){
 if(d.handout){
  handoutURL = d.handout.replace(/"/g,"").trim();
 }
}

function openPreview(){
 if(handoutURL) window.open(handoutURL,"_blank");
 else alert("Kein Handout vorhanden");
}

function downloadHandout(){
 if(handoutURL) window.open(handoutURL,"_blank");
 else alert("Kein Handout vorhanden");
}

// LOOP
setInterval(load,3000);

</script>

</body>
</html>
