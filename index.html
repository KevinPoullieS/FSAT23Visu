<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CO2 PRO FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;margin:0}
.card{background:#222;padding:15px;margin:10px;border-radius:15px}
button{padding:10px;margin:5px;width:90%;border-radius:10px;border:none}
.ampel{width:25px;height:25px;border-radius:50%;margin:auto}
</style>
</head>

<body>

<div id="login">
<h2>Login</h2>
<button onclick="loginSchueler()">Schüler</button><br>
<input id="pw" placeholder="Admin Passwort">
<button onclick="loginAdmin()">Admin</button>
</div>

<div id="app" style="display:none">

<button onclick="show('raum')">Raum</button>
<button onclick="show('wetter')">Wetter</button>
<button onclick="show('settings')" id="adminBtn" style="display:none">Admin</button>

<!-- RAUM -->
<div id="raum" class="card">

<h3>ESP Status</h3>
<div id="espStatus" class="ampel"></div>
<p id="espText"></p>
<p>📶 <span id="wifi">--</span> dBm</p>
<p>🔋 <span id="volt">--</span> V</p>

<p>Temp: <span id="temp">--</span> °C</p>
<p>KTY: <span id="kty">--</span> °C</p>
<p>Hum: <span id="hum">--</span> %</p>
<p>CO2: <span id="co2">--</span> ppm</p>

<canvas id="chart"></canvas>

</div>

<!-- WETTER -->
<div id="wetter" class="card" style="display:none">
<input id="cityInput" placeholder="Ort">
<button onclick="setCity()">Speichern</button>
<p id="city"></p>
<p>Jetzt: <span id="wNow"></span></p>
<p>+1h: <span id="w1"></span></p>
<p>+2h: <span id="w2"></span></p>
</div>

<!-- SETTINGS -->
<div id="settings" class="card" style="display:none">

<h3>Demo</h3>

Temp <input id="tempSlider" type="range" min="-5" max="50" value="20"><br>
KTY <input id="ktySlider" type="range" min="-5" max="60" value="22"><br>
Hum <input id="humSlider" type="range" min="0" max="100" value="50"><br>
CO2 <input id="co2Slider" type="range" min="400" max="2000" value="800"><br>

<button onclick="startDemo()">Demo Start</button>
<button onclick="goLive()">Live</button>

</div>

</div>

<script>

const url="https://finalfsat23roomc-default-rtdb.europe-west1.firebasedatabase.app/.json";
const apiKey="e733d08921989a3920c3e85507388b6e";

let cityName=localStorage.getItem("city")||"Worms";

// LOGIN
function loginSchueler(){
 login.style.display="none";
 app.style.display="block";
}
function loginAdmin(){
 if(pw.value==="12345"){
  login.style.display="none";
  app.style.display="block";
  adminBtn.style.display="block";
 } else alert("Falsch");
}

// NAV
function show(id){
 document.querySelectorAll(".card").forEach(c=>c.style.display="none");
 document.getElementById(id).style.display="block";
}

// CHART
let chart=new Chart(document.getElementById("chart"),{
 type:"line",
 data:{labels:[],datasets:[
  {label:"Temp",data:[],borderColor:"orange"},
  {label:"KTY",data:[],borderColor:"red"},
  {label:"Hum",data:[],borderColor:"blue"},
  {label:"CO2",data:[],borderColor:"green"}
 ]}
});

// LOAD DATA
async function load(){
 try{
  let res=await fetch(url);
  let d=await res.json();

  if(!d) return;

  let s=d.status||{};
  let v=(d.mode==="demo")?d.demo:d.data;

  if(!v) return;

  // STATUS
  let diff=Date.now()- (s.heartbeat||0);
  espStatus.style.background=diff<10000?"green":"red";
  espText.innerText=diff<10000?"Online":"Offline";

  wifi.innerText=s.rssi??"--";
  volt.innerText=s.voltage??"--";

  // WERTE
  temp.innerText=v.temp??"--";
  kty.innerText=v.kty??"--";
  hum.innerText=v.hum??"--";
  co2.innerText=v.co2??"--";

  // GRAPH
  let t=new Date().toLocaleTimeString();
  chart.data.labels.push(t);
  chart.data.datasets[0].data.push(v.temp||0);
  chart.data.datasets[1].data.push(v.kty||0);
  chart.data.datasets[2].data.push(v.hum||0);
  chart.data.datasets[3].data.push(v.co2||0);

  if(chart.data.labels.length>20){
   chart.data.labels.shift();
   chart.data.datasets.forEach(ds=>ds.data.shift());
  }

  chart.update();

 }catch(e){
  console.log("LOAD ERROR",e);
 }
}

// DEMO
function startDemo(){
 sendDemo();
}

function sendDemo(){
 fetch(url,{
  method:"PATCH",
  body:JSON.stringify({
   mode:"demo",
   demo:{
    temp:+tempSlider.value,
    kty:+ktySlider.value,
    hum:+humSlider.value,
    co2:+co2Slider.value
   }
  })
 });
}

// SLIDER LIVE
[tempSlider,ktySlider,humSlider,co2Slider].forEach(s=>{
 s.oninput=sendDemo;
});

// LIVE
function goLive(){
 fetch(url,{method:"PATCH",body:JSON.stringify({mode:"live"})});
}

// WETTER
function setCity(){
 let c=cityInput.value.trim();
 if(!c) return;
 cityName=c;
 localStorage.setItem("city",c);
 loadWeather();
}

function emoji(t){
 if(t.includes("Clear"))return"☀️";
 if(t.includes("Rain"))return"🌧️";
 if(t.includes("Snow"))return"❄️";
 if(t.includes("Thunderstorm"))return"⛈️";
 return"☁️";
}

async function loadWeather(){
 try{
  let res=await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${cityName}&appid=${apiKey}&units=metric`);
  let w=await res.json();

  if(w.cod!=="200") return;

  city.innerText="📍 "+w.city.name;

  wNow.innerText=emoji(w.list[0].weather[0].main)+" "+w.list[0].main.temp.toFixed(1)+"°C";
  w1.innerText=emoji(w.list[1].weather[0].main)+" "+w.list[1].main.temp.toFixed(1)+"°C";
  w2.innerText=emoji(w.list[2].weather[0].main)+" "+w.list[2].main.temp.toFixed(1)+"°C";

 }catch(e){
  console.log("WETTER ERROR",e);
 }
}

// LOOP
setInterval(load,3000);
setInterval(loadWeather,10000);

</script>

</body>
</html>
